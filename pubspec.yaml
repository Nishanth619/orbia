name: orbia_game
description: A 2D arcade game inspired by Orbia with orbital mechanics.
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.18.0
  flame_audio: ^2.10.0
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.3.1
  google_mobile_ads: ^5.1.0
  in_app_purchase: ^3.2.0
  equatable: ^2.0.5
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/sfx/
    - assets/audio/music/
    - assets/fonts/
  fonts:
    - family: NeonFont
      fonts:
        - asset: assets/fonts/NeonFont.ttf
          weight: 400
